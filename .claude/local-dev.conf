# ============================================================
# Config do projeto pra skill global `local-dev` (TwoBrains)
# ============================================================
# Copiar pra <repo>/.claude/local-dev.conf e ajustar os valores.
# Este arquivo é sourçado pelos scripts em ~/.claude/skills/local-dev/scripts/.
# Não tem segredo — é seguro commitar.

# === Identidade do projeto ===

# Slug canônico do projeto (igual ao nome do diretório do clone principal,
# ex: ~/code/aja-agora → aja-agora).
PROJECT_NAME="aja-agora"

# Prefixo curto pra nomear containers/volumes. Default: primeiro segmento
# do PROJECT_NAME antes do '-'. Ajuste se ficar feio.
# Containers ficam <PREFIX>-pg-<workspace>, <PREFIX>-app-<workspace>.
PROJECT_PREFIX="aja"

# Nome canônico do banco no Postgres local (com underscore, lowercase).
# Diferente do nome do DB no RDS AWS (que geralmente tem hífen).
PROJECT_DB_NAME="aja_agora"

# === AWS (pra dump-from-dev.sh) ===

# Nome literal do DB no RDS de dev (case-sensitive, como aparece em pg_database).
AWS_DB_NAME="aja-agora-dev"

# Role Postgres pra conectar no RDS de dev.
AWS_PG_ROLE="app_aja_agora_dev"

# Path do Secret no Secrets Manager onde a senha do role vive.
AWS_SECRET_NAME="tb/dba/postgres/app_aja_agora_dev"

# Profile AWS SSO pra autenticar (default: tb-prod — cobre dev da mesma conta).
AWS_PROFILE_DEFAULT="tb-prod"

# (Opcional — defaults globais costumam servir)
# AWS_REGION="sa-east-1"
# RDS_ENDPOINT="db-twobrains-prd.cj6kou8iuh0s.sa-east-1.rds.amazonaws.com"
# RDS_PORT="5432"

# === Letta (opcional) ===

# Namespace base pro Letta. Default: <PROJECT_NAME>-local-<workspace>.
# Sobrescreva só se o projeto usar formato diferente.
# LETTA_NAMESPACE_PREFIX="${PROJECT_NAME}-local"
