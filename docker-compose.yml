# aja-agora — local dev por workspace
#
# Convenção TwoBrains: cada branch/worktree é um workspace isolado com
# seu Postgres + App em containers nomeados por WORKSPACE_NAME. A memória
# cross-channel vive no próprio Postgres do workspace (FIX-81 — Letta removido).
# A rede tb-local-net segue compartilhada (outros serviços _shared/).
#
# DNS local via OrbStack (label dev.orbstack.domains):
#   - aja-${WORKSPACE_NAME}.orb.local       → app
#   - db.aja-${WORKSPACE_NAME}.orb.local    → postgres
#   - aja-${WORKSPACE_NAME}.orb.local   → (default automático do OrbStack)
#
# Setup:
#   ./.claude/skills/local-dev/scripts/bootstrap-workspace.sh
#
# Ver: ~/.tb-local/CONVENTIONS.md, .claude/skills/local-dev/SKILL.md

name: aja-agora-${WORKSPACE_NAME:?WORKSPACE_NAME required (use the branch or worktree dir name)}

services:
  db:
    image: postgres:16-alpine
    container_name: aja-pg-${WORKSPACE_NAME}
    restart: unless-stopped
    # DNS-first (padrão dev-stack): SEM publicar porta no host. O OrbStack
    # roteia db.aja-<workspace>.orb.local:5432 → porta interna. Permite N
    # workspaces simultâneos sem colisão de porta. (Override Windows publica
    # porta — não há .orb.local lá.)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aja_agora}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tb-local-net
    labels:
      dev.orbstack.domains: db.aja-${WORKSPACE_NAME}.orb.local
      tb.workspace: ${WORKSPACE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # FIX-44: Redis pro worker de polling do desfecho (BullMQ). Segregado por
    # workspace, DNS-first (sem porta publicada).
    image: redis:7-alpine
    container_name: aja-redis-${WORKSPACE_NAME}
    restart: unless-stopped
    networks:
      - tb-local-net
    labels:
      dev.orbstack.domains: redis.aja-${WORKSPACE_NAME}.orb.local
      tb.workspace: ${WORKSPACE_NAME}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # FIX-62: object storage S3-compatível pros PDFs das administradoras (dossiê
    # de operação do copiloto). Segregado por workspace, DNS-first (sem porta
    # publicada). Em prod as S3_* apontam pro S3 real (sem S3_ENDPOINT). O bucket
    # é criado on-demand pelo client (ensureBucket) — sem passo de provisionamento.
    image: minio/minio:latest
    container_name: aja-minio-${WORKSPACE_NAME}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    networks:
      - tb-local-net
    labels:
      dev.orbstack.domains: minio.aja-${WORKSPACE_NAME}.orb.local console.aja-minio-${WORKSPACE_NAME}.orb.local
      tb.workspace: ${WORKSPACE_NAME}

  app:
    profiles: ["containerized"]
    # Modo DEV/HMR (padrão dev-stack): Dockerfile.dev roda `next dev` com
    # Turbopack. O source vem por bind mount (./:/app) — editar src/ recompila
    # sem rebuild.
    #
    # Arquitetura pnpm (regra global — anti-fritar Mac):
    # - app_node_modules é NAMED (não anônimo) → I/O rápido fora do VirtioFS,
    #   sobrevive recreate. Dockerfile.dev NÃO instala deps; o install roda no
    #   CMD na 1ª subida gravando aqui.
    # - pnpm_store é UM volume externo compartilhado por TODOS os workspaces
    #   (tb-pnpm-store-shared), mesmo filesystem que node_modules → hardlink →
    #   subir workspace novo = install quase instantâneo, ~zero disco extra.
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aja-app-${WORKSPACE_NAME}
    restart: unless-stopped
    # DNS-first: SEM porta publicada. Acesso por http://aja-<workspace>.orb.local
    # (OrbStack roteia → 3000 interna).
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - /app/.next
    environment:
      # Dev mode: HMR + Turbopack + source maps.
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      # OrbStack bind mount não emite inotify — watcher precisa de polling.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # migrate-guard libera destrutivas em local.
      TB_ENV: local
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@aja-pg-${WORKSPACE_NAME}:5432/${POSTGRES_DB:-aja_agora}
      REDIS_URL: redis://aja-redis-${WORKSPACE_NAME}:6379
      # FIX-62: object storage S3-compatível (MinIO local / S3 prod). Vazio em
      # S3_ENDPOINT = AWS real (prod). forcePathStyle obrigatório pro MinIO.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://aja-minio-${WORKSPACE_NAME}:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aja-administradora-docs}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY required}
      # Memória cross-channel re-homeada pro Postgres (FIX-81). O Letta foi
      # removido — a memória vive na tabela memory_identities do próprio DB.
      MEMORY_ADAPTER: ${MEMORY_ADAPTER:-postgres}
      MEMORY_NAMESPACE: aja-agora-local-${WORKSPACE_NAME}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET required}
      BETTER_AUTH_URL: http://aja-${WORKSPACE_NAME}.orb.local
      APP_URL: http://aja-${WORKSPACE_NAME}.orb.local
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_AGENT_PHONES: ${WHATSAPP_AGENT_PHONES:-}
      WHATSAPP_AGENT_NAMES: ${WHATSAPP_AGENT_NAMES:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL required (set in .env.local)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required (set in .env.local)}
      FEATURE_LANDING_PAGE: ${FEATURE_LANDING_PAGE:-true}
      # Bevi é a fonte ÚNICA (mock em runtime PROIBIDO — docs/jornada/CONTEXT.md).
      # Descoberta (Trilho B): exige BEVI_SELFCONTRACT_HASH; falha alto sem.
      BEVI_SELFCONTRACT_HASH: ${BEVI_SELFCONTRACT_HASH:-}
      BEVI_SELFCONTRACT_BASE_URL: ${BEVI_SELFCONTRACT_BASE_URL:-}
      # Identidade (gate identify): cifra do CPF — openssl rand -base64 32.
      IDENTITY_ENC_KEY: ${IDENTITY_ENC_KEY:-}
      # Fulfillment (passo 5): API de Parceiro real (exige BEVI_API_TOKEN).
      PROPOSAL_GATEWAY: ${PROPOSAL_GATEWAY:-bevi}
      BEVI_API_TOKEN: ${BEVI_API_TOKEN:-}
      BEVI_BASE_URL: ${BEVI_BASE_URL:-}
      BEVI_PRODUCT_ID: ${BEVI_PRODUCT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tb-local-net
    labels:
      dev.orbstack.domains: aja-${WORKSPACE_NAME}.orb.local
      tb.workspace: ${WORKSPACE_NAME}

volumes:
  pgdata:
    name: aja-pg-${WORKSPACE_NAME}-data
  miniodata:                             # PDFs das administradoras, por workspace
    name: aja-minio-${WORKSPACE_NAME}-data
  app_node_modules:                      # por workspace (deps materializadas, fora do bind)
  pnpm_store:                            # store content-addressable, 1 cópia física global
    name: tb-pnpm-store-shared
    external: true

networks:
  tb-local-net:
    external: true
    name: tb-local-net
