# aja-agora — stack do WORKSPACE, convenção local-dev v2 (2026-07-12): SÓ o app.
# Postgres, Redis e MinIO são COMPARTILHADOS do projeto (docker-compose.shared.yml,
# project aja-shared) — este compose liga o app neles via tb-local-net. O que isola
# cada workspace: DATABASE próprio (${WORKSPACE_DB_NAME}, criado pelo workspace-db.sh
# no bootstrap) e Redis DB index (${REDIS_DB_INDEX}).
#
# Worker de BLOCO (onda todo-blocks) NÃO sobe nada disto — no máximo o database
# (bootstrap-workspace.sh --db-only). O app sobe pra base integradora e revisão manual.
#
# Geração anterior (pg/redis/minio por workspace) → git history deste arquivo.
#
# DNS local via OrbStack: aja-${WORKSPACE_NAME}.orb.local → app
# Setup: ~/.claude/skills/local-dev/scripts/bootstrap-workspace.sh
# Ver: ~/.claude/skills/local-dev/SKILL.md (§1 convenção v2)

name: aja-agora-${WORKSPACE_NAME:?WORKSPACE_NAME required (use the branch or worktree dir name)}

services:
  app:
    profiles: ["containerized"]
    # Modo DEV/HMR: Dockerfile.dev roda `next dev` com Turbopack; source por bind mount.
    #
    # Arquitetura pnpm (regra global — anti-fritar Mac):
    # - app_node_modules NAMED por workspace (I/O fora do VirtioFS, sobrevive recreate)
    # - pnpm_store ÚNICO compartilhado (tb-pnpm-store-shared) → hardlink → install ~zero
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aja-app-${WORKSPACE_NAME}
    restart: unless-stopped
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - /app/.next
    environment:
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # migrate-guard libera destrutivas em local.
      TB_ENV: local
      # Database POR WORKSPACE no PG shared (bootstrap preenche WORKSPACE_DB_NAME)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@aja-shared-pg:5432/${WORKSPACE_DB_NAME:-aja_agora}
      # Redis lógico por workspace (bootstrap aloca REDIS_DB_INDEX)
      REDIS_URL: redis://aja-shared-redis:6379/${REDIS_DB_INDEX:-0}
      # Object storage compartilhado do projeto (MinIO local / S3 prod)
      S3_ENDPOINT: ${S3_ENDPOINT:-http://aja-shared-minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aja-administradora-docs}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # FIX-82: bucket DEDICADO de documentos de cliente (PII de identidade). KMS vazio
      # em dev (MinIO local sem KMS; prod é PENDENTE-KAIRO).
      S3_CLIENT_DOCS_BUCKET: ${S3_CLIENT_DOCS_BUCKET:-aja-client-docs}
      S3_CLIENT_DOCS_KMS_KEY_ID: ${S3_CLIENT_DOCS_KMS_KEY_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY required}
      # Repasse explícito (removido por engano na limpeza de vars vazias de
      # 2026-07-21 e restaurado aqui). Hoje o `.env.local` chega pelo bind `./:/app`
      # e o Next o carrega sozinho, então o app funciona mesmo sem estas linhas —
      # mas quem roda o container sem o bind (CI, imagem publicada) fica sem gateway
      # e cai na Anthropic direta, cuja key está com cota estourada até 2026-08-01.
      # `?.trim() ||` no código trata string vazia como ausente, então `:-` é seguro.
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_SRV_NAME: ${LITELLM_SRV_NAME:-}
      # Roteamento LiteLLM (FIX-209 no código, builder.ts + gateway-anthropic.ts) —
      # AGORA REPASSADO ao container. Motivo (2026-07-15): a ANTHROPIC_API_KEY do
      # workspace está com COTA ESTOURADA até 2026-08-01 ("workspace API usage
      # limits"), então chamar api.anthropic.com direto retorna 400 e a jornada
      # trava em "Processando…". Em local, rotear pelo gateway shared (via túnel SSM
      # na porta 4000, alcançado pelo container como host.docker.internal:4000)
      # deixou de ser opcional. .env.local já traz os dois valores:
      #   LITELLM_BASE_URL=http://host.docker.internal:4000   (host-reachable)
      #   LITELLM_API_KEY=sk-...                               (virtual key do projeto)
      # Sem eles setados, resolveGatewayHost() retorna null e cai no Anthropic direto
      # (fallback antigo — quebrado enquanto a cota estiver estourada).
      #
      # ⚠️ Footgun histórico (empty-string × `??`): compose materializa a var mesmo
      # vazia; `LITELLM_API_KEY ?? ANTHROPIC_API_KEY` NÃO cai pro fallback em "".
      # Neutralizado na FONTE: gateway-anthropic.ts agora usa `?.trim() ||` (trata
      # string vazia como ausente). Por isso `${LITELLM_API_KEY:-}` aqui é seguro.
      # Default EXPLÍCITO (nunca vazio): `${AI_MODEL:-}` virava "" quando a var não
      # está no shell/.env, e o código faz `process.env.AI_MODEL ?? "claude-sonnet-5"`
      # — `??` NÃO pega string vazia, então o app roteava com model VAZIO pro provider
      # OpenAI-compat (/responses → 400 "Invalid model name" → turno vazio → fallback
      # "me perdi"). Mesma armadilha `${VAR:-}` × `??` que o comentário acima descreve.
      # haiku é o modelo de dev (bakeoff FIX-304). Override: `AI_MODEL=X docker compose up`.
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5}
      # Memória cross-channel no Postgres (FIX-81 — Letta removido).
      MEMORY_ADAPTER: ${MEMORY_ADAPTER:-postgres}
      MEMORY_NAMESPACE: aja-agora-local-${WORKSPACE_NAME}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET required}
      BETTER_AUTH_URL: http://aja-${WORKSPACE_NAME}.orb.local
      APP_URL: http://aja-${WORKSPACE_NAME}.orb.local
      WHATSAPP_AGENT_PHONES: ${WHATSAPP_AGENT_PHONES:-}
      WHATSAPP_AGENT_NAMES: ${WHATSAPP_AGENT_NAMES:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL required (set in .env.local)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required (set in .env.local)}
      FEATURE_LANDING_PAGE: ${FEATURE_LANDING_PAGE:-true}
      # Bevi é a fonte ÚNICA (mock em runtime PROIBIDO — docs/jornada/CONTEXT.md).
      BEVI_SELFCONTRACT_BASE_URL: ${BEVI_SELFCONTRACT_BASE_URL:-}
      PROPOSAL_GATEWAY: ${PROPOSAL_GATEWAY:-bevi}
    networks:
      - tb-local-net
    labels:
      dev.orbstack.domains: aja-${WORKSPACE_NAME}.orb.local
      tb.workspace: ${WORKSPACE_NAME}
      tb.project: aja-agora
      tb.role: app

volumes:
  app_node_modules:                      # por workspace (deps materializadas, fora do bind)
  pnpm_store:                            # store content-addressable, 1 cópia física global
    name: tb-pnpm-store-shared
    external: true

networks:
  tb-local-net:
    external: true
    name: tb-local-net
